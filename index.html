<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
    <title>Sternen-Memory – Sternbilder</title>
</head>
<body>
    <div class="starfield" id="starfield" aria-hidden="true"></div>
    <div class="nebula" aria-hidden="true"></div>

    <main class="game">
        <header class="header">
            <h1 class="title">Sternen-Memory</h1>
            <p class="subtitle">Ordne jedem <strong>Namen</strong> das passende <strong>Sternbild</strong> am Nachthimmel zu</p>
        </header>

        <div class="topbar">
            <div class="stat">Züge: <span id="moves">0</span></div>
            <div class="stat">Paare: <span id="matches">0</span>/<span id="totalPairs">8</span></div>
            <div class="stat">Zeit: <span id="timer">0s</span></div>
        </div>

        <button id="restart" class="restart" type="button">Neues Spiel</button>
        <div id="status" class="status" role="status" aria-live="polite"></div>

        <div class="wrapper" id="board" aria-label="Spielfeld"></div>
    </main>

    <div id="celebration" class="celebration celebration--hidden" role="dialog" aria-modal="true" aria-labelledby="celebrationTitle" aria-hidden="true">
        <div class="celebration-backdrop" aria-hidden="true"></div>
        <div class="celebration-aurora" aria-hidden="true"></div>
        <div class="celebration-particles" id="celebrationParticles" aria-hidden="true"></div>
        <div class="celebration-meteors" id="celebrationMeteors" aria-hidden="true"></div>
        <div class="celebration-panel">
            <div class="celebration-orbit" aria-hidden="true"></div>
            <h2 id="celebrationTitle" class="celebration-title">Geschafft!</h2>
            <p class="celebration-sub">Alle Sternbilder am Himmel vereint.</p>
            <p class="celebration-stats" id="celebrationStats"></p>
            <button type="button" class="celebration-btn" id="celebrationClose">Weiterspielen</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
